<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitUp</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 { margin-bottom: 0.5rem; }
        p { color: #666; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>FitUp</h1>
        <p id="message">Opening the app...</p>
    </div>

    <script>
        (function() {
            var path = window.location.pathname;
            var search = window.location.search;

            // Chrome on Android requires Intent URL format
            // This will open the app if installed, or do nothing if not
            var intentUrl = 'intent:/' + path + search
                + '#Intent;scheme=fit;package=com.up.fit;end';

            window.location.href = intentUrl;

            // Fallback if the app didn't open
            setTimeout(function() {
                document.getElementById('message').textContent =
                    'Could not open the app. Please install FitUp from your app store.';
            }, 2000);
        })();
    </script>
</body>
</html>
